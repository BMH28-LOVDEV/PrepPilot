services:
  - type: web
    name: preppilot-api
    env: docker
    plan: starter
    branch: main
    rootDir: .
    dockerfilePath: Dockerfile
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: CLIENT_API_KEY
        sync: false
      - key: APP_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
